services:
  db:
    image: postgres:14
    container_name: taskvault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
      - ./backend/migrations/002_refresh_tokens.sql:/docker-entrypoint-initdb.d/002_refresh_tokens.sql
      - ./backend/migrations/004_activity_logs.sql:/docker-entrypoint-initdb.d/004_activity_logs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskvault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
